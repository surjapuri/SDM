name: Inject runtime configuration

# ═══════════════════════════════════════════════════════════════════════
#  GITHUB-AS-CONFIG-STORE  — how this works
#  ─────────────────────────────────────────────────────────────────────
#  1. You add API keys as GitHub repository SECRETS
#     (Settings → Secrets and variables → Actions → New repository secret)
#
#  2. This workflow runs on every push to main AND on manual trigger.
#     It generates docs/js/runtime-config.js from those secrets.
#
#  3. docs/js/runtime-config.js is committed and served by GitHub Pages.
#     The browser reads it at startup — no Firebase, no separate server.
#
#  IMPORTANT SECURITY NOTE
#  ─────────────────────────────────────────────────────────────────────
#  Only NON-SECRET values should go in runtime-config.js.
#  The file is public (served from GitHub Pages).
#
#  ✅ Safe to put here:   Firebase client config (designed to be public),
#                         Functions base URL, feature flags, version strings.
#  ❌ NEVER put here:     Mesh/Claude API key, admin credentials,
#                         any key that allows write access to paid services.
#
#  The Mesh API key must stay on the server side (functions/.env).
#  The only "secret" in runtime-config.js is the Functions endpoint URL
#  (which obscures the backend host slightly, but is NOT a real secret).
# ═══════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate docs/js/runtime-config.js
        env:
          # ── Firebase client config (public — these are designed to be committed) ──
          FIREBASE_API_KEY:           ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:       ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:        ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:    ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER:  ${{ secrets.FIREBASE_MESSAGING_SENDER }}
          FIREBASE_APP_ID:            ${{ secrets.FIREBASE_APP_ID }}

          # ── Backend URL — NOT the API key itself ──
          FUNCTIONS_BASE_URL:         ${{ secrets.FUNCTIONS_BASE_URL }}

          # ── Feature flags ──
          AI_FEATURES_ENABLED:        ${{ secrets.AI_FEATURES_ENABLED }}

        run: |
          cat > docs/js/runtime-config.js << 'JSEOF'
          /* ================================================================
             runtime-config.js  —  AUTO-GENERATED by GitHub Actions
             DO NOT EDIT MANUALLY — your changes will be overwritten.
             To update values: edit the repository secrets then re-run
             the "Inject runtime configuration" workflow.
             ================================================================ */
          JSEOF

          # Append the actual values.  Using printf so special chars
          # in secrets can't break the heredoc or inject code.
          printf 'window.QRV_RUNTIME_CONFIG = {\n' >> docs/js/runtime-config.js
          printf '  firebaseApiKey:          %s,\n' "\"${FIREBASE_API_KEY:-}\"" >> docs/js/runtime-config.js
          printf '  firebaseAuthDomain:      %s,\n' "\"${FIREBASE_AUTH_DOMAIN:-}\"" >> docs/js/runtime-config.js
          printf '  firebaseProjectId:       %s,\n' "\"${FIREBASE_PROJECT_ID:-}\"" >> docs/js/runtime-config.js
          printf '  firebaseStorageBucket:   %s,\n' "\"${FIREBASE_STORAGE_BUCKET:-}\"" >> docs/js/runtime-config.js
          printf '  firebaseMessagingSender: %s,\n' "\"${FIREBASE_MESSAGING_SENDER:-}\"" >> docs/js/runtime-config.js
          printf '  firebaseAppId:           %s,\n' "\"${FIREBASE_APP_ID:-}\"" >> docs/js/runtime-config.js
          printf '  functionsBaseUrl:        %s,\n' "\"${FUNCTIONS_BASE_URL:-}\"" >> docs/js/runtime-config.js
          printf '  aiFeaturesEnabled:       %s,\n' "${AI_FEATURES_ENABLED:-false}" >> docs/js/runtime-config.js
          printf '  generatedAt:             %s,\n' "\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"" >> docs/js/runtime-config.js
          printf '};\n' >> docs/js/runtime-config.js

          echo "Generated docs/js/runtime-config.js:"
          cat docs/js/runtime-config.js

      - name: Commit runtime-config.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/js/runtime-config.js

          if git diff --cached --quiet; then
            echo "Config unchanged — nothing to commit."
          else
            git commit -m "chore: refresh runtime-config.js from secrets [automated]"
            git push
          fi
