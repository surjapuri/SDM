name: Update free threat-intel blocklists

on:
  schedule:
    # Runs weekly, Monday 03:00 UTC. Adjust freely — this costs nothing
    # and needs no local execution since it runs entirely on GitHub.
    - cron: "0 3 * * 1"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch OpenPhish community feed
        run: |
          curl -sL "https://openphish.com/feed.txt" -o /tmp/openphish_raw.txt || touch /tmp/openphish_raw.txt
          node .github/scripts/build-blocklist.js \
            --input /tmp/openphish_raw.txt \
            --output public/data/blocklists/openphish.json \
            --source "OpenPhish community feed (free, no API key)"

      - name: Fetch URLhaus feed
        run: |
          curl -sL "https://urlhaus.abuse.ch/downloads/text_online/" -o /tmp/urlhaus_raw.txt || touch /tmp/urlhaus_raw.txt
          node .github/scripts/build-blocklist.js \
            --input /tmp/urlhaus_raw.txt \
            --output public/data/blocklists/urlhaus.json \
            --source "URLhaus (abuse.ch), free, no API key"

      # PhishTank's bulk data download requires a free registered API key
      # for reliability at scale. If you register one (still free), add
      # it as a repo secret PHISHTANK_API_KEY and uncomment below. Until
      # then, this step is skipped and the existing seed file is kept.
      # - name: Fetch PhishTank feed
      #   run: |
      #     curl -sL "https://data.phishtank.com/data/${{ secrets.PHISHTANK_API_KEY }}/online-valid.json" -o /tmp/phishtank_raw.json
      #     node .github/scripts/build-blocklist.js --input /tmp/phishtank_raw.json --output public/data/blocklists/phishtank.json --source "PhishTank" --format json

      - name: Commit refreshed blocklists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/blocklists/*.json
          git diff --cached --quiet || git commit -m "chore: refresh free threat-intel blocklists [automated]"
          git push
